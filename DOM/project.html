<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image slider</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .sheet {

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: beige;

        }

        .slider-container {
            display: flex;
            flex-direction: column;
            position: relative;
            width: 90%;
            max-width: 700px;
            margin: auto;
            overflow: hidden;
            border-radius: 15px;
        }

        .slider-wrapper {
            display: flex;
            transition: transform 0.3s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        .btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(237, 237, 237, 0.5);
            color: white;
            border: none;
            padding: 1rem;
            cursor: pointer;
        }

        .prev {
            left: 0;
        }

        .next {
            right: 0;
        }
    </style>

</head>

<body>

    <div class="sheet">

        <div class="slider-container">
            <div class="slider-wrapper">
                <div class="slide" style="background: #520795;">
                    <img src="https://static.vecteezy.com/vite/assets/photo-masthead-375-BoK_p8LG.webp" alt="">
                </div>
                <div class="slide" style="background: #06ede5;">
                    <img src="https://img.freepik.com/free-photo/beautiful-lake-mountains_395237-44.jpg?semt=ais_hybrid&w=740&q=80"
                        alt="">
                </div>
                <div class="slide" style="background: #689607;">
                    <img src="https://www.shutterstock.com/image-photo/sun-sets-behind-mountain-ranges-600nw-2479236003.jpg"
                        alt="">
                </div>
            </div>

            <button class="btn prev" onclick="moveSlide(-1)">&#10094;</button>
            <button class="btn next" onclick="moveSlide(1)">&#10095;</button>
        </div>
        <h1>image slider</h1>
        <h3>click on the right and left arrows to change the image</h3>
    </div>









    <script>


        let currentIndex = 0;

        function moveSlide(direction) {
            const slides = document.querySelectorAll('.slide');
            const totalSlides = slides.length;


            currentIndex += direction;

            if (currentIndex >= totalSlides) {
                currentIndex = 0;
            } else if (currentIndex < 0) {
                currentIndex = totalSlides - 1;
            }


            const offset = currentIndex * -100;
            document.querySelector('.slider-wrapper').style.transform = `translateX(${offset}%)`;
        }

    </script>









</body>

</html>
