<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jQuery Practice</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        #box {
            width: 200px;
            height: 200px;
            background: teal;
            margin: 20px auto;
            color: white;
            line-height: 200px;
        }

        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2 id="text">Hello jQuery</h2>

    <div id="box">BOX</div>

    <button id="bgBtn">Click: Change BG</button>
    <button id="dblBtn">Double Click: Hide Text</button>

    <br>

    <button id="showBtn">Show</button>
    <button id="hideBtn">Hide</button>
    <button id="toggleBtn">Toggle</button>

    <br>

    <button id="fadeInBtn">Fade In</button>
    <button id="fadeOutBtn">Fade Out</button>
    <button id="fadeToggleBtn">Fade Toggle</button>

    <br>

    <button id="slideDownBtn">Slide Down</button>
    <button id="slideUpBtn">Slide Up</button>
    <button id="slideToggleBtn">Slide Toggle</button>

    <br>

    <button id="animateBtn">Animate</button>

    <br>

    <button id="stopBtn">Stop</button>
    <button id="delayBtn">Delay</button>

    <script>
        $(document).ready(function(){

            $("#bgBtn").click(function(){
                $("body").css("background-color", "lightblue");
            });

            $("#dblBtn").dblclick(function(){
                $("#text").hide();
            });

            $("#showBtn").click(function(){
                $("#box").show();
            });

            $("#hideBtn").click(function(){
                $("#box").hide();
            });

            $("#toggleBtn").click(function(){
                $("#box").toggle();
            });

            $("#fadeInBtn").click(function(){
                $("#box").fadeIn();
            });

            $("#fadeOutBtn").click(function(){
                $("#box").fadeOut();
            });

            $("#fadeToggleBtn").click(function(){
                $("#box").fadeToggle();
            });

            $("#slideDownBtn").click(function(){
                $("#box").slideDown();
            });

            $("#slideUpBtn").click(function(){
                $("#box").slideUp();
            });

            $("#slideToggleBtn").click(function(){
                $("#box").slideToggle();
            });

            $("#animateBtn").click(function(){
                $("#box").animate({
                    width: "300px",
                    height: "300px",
                }, 1000);
            });

            $("#stopBtn").click(function(){
                $("#box").stop();
            });

            $("#delayBtn").click(function(){
                $("#box")
                    .fadeOut(1000)
                    .delay(1000)
                    .fadeIn(1000);
            });

        });
    </script>

</body>
</html>
